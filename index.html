<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUND TYPO - Visualizer</title>
    <!-- Noto Sans JP 可変ウェイト版をロード -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <!-- Scene 4 ORBIT用 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0A0A0A;
            font-family: 'Noto Sans JP', sans-serif;
            color: #FFFFFF;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 背景canvas：放射状ライン + Dissolveドット + Bubble / TILEグリッド */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ビート時フラッシュ用オーバーレイ */
        #flashOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
            z-index: 50;
        }

        /* シーン切り替えトランジション用オーバーレイ */
        #transitionOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0A0A0A;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
        }

        /* マイク許可前のスタート画面 */
        #startScreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            opacity: 0.4;
            letter-spacing: 0.2em;
            cursor: pointer;
            z-index: 10;
            user-select: none;
        }

        /* Ghost残像要素（3つ）：常時fixed配置、opacityで表示制御 */
        .ghost-el {
            position: fixed;
            top: 50%;
            left: 50%;
            font-family: 'Noto Sans JP', sans-serif;
            color: #FFFFFF;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            z-index: 3;
            display: none;
        }

        /* Blast拡大エフェクト（強ビート時：1.8倍以上で発動） */
        #blastWrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            display: none;
        }

        #blastTransform {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        #blastText {
            font-family: 'Noto Sans JP', sans-serif;
            color: #FFFFFF;
            white-space: nowrap;
            display: block;
            transform-origin: center center;
        }

        /* メインテキストの位置決め用ラッパー（全画面コンテナ） */
        #mainTextWrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 5;
            pointer-events: none;
        }

        /* すべての変形を受け取る要素：画面中央に絶対配置し重心を固定 */
        #textTransform {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        /* 実際のテキスト要素（Charスパンを内包） */
        #mainText {
            font-family: 'Noto Sans JP', sans-serif;
            color: #FFFFFF;
            white-space: nowrap;
            display: block;
            transform-origin: center center;
        }

        /* High > 30 のとき震えアニメーション */
        @keyframes shake {
            0%   { transform: translateX(0px); }
            25%  { transform: translateX(2px); }
            75%  { transform: translateX(-2px); }
            100% { transform: translateX(0px); }
        }

        .shaking {
            animation: shake 0.05s infinite;
        }

        /* 左下：テキスト入力欄 */
        #textInput {
            position: fixed;
            bottom: 32px;
            left: 32px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 14px;
            outline: none;
            width: 200px;
            padding: 4px 0;
            z-index: 20;
            display: none;
        }

        #textInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* 右下：MICボタン */
        #micButton {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 0.1em;
            z-index: 20;
            display: none;
            padding: 0;
        }

        /* 右上：デバッグ表示 */
        #debugPanel {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 12px;
            padding: 8px;
            z-index: 20;
            line-height: 1.8;
            pointer-events: none;
        }

        /* 左下：シーンラベル（テキスト入力欄の上） */
        #sceneLabel {
            position: fixed;
            bottom: 70px;
            left: 32px;
            font-size: 12px;
            color: #FFFFFF;
            opacity: 0.3;
            letter-spacing: 0.15em;
            z-index: 20;
            pointer-events: none;
            display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <div id="flashOverlay"></div>
    <div id="transitionOverlay"></div>

    <!-- Ghost残像要素（Highモード時に表示） -->
    <div class="ghost-el" id="ghost0"></div>
    <div class="ghost-el" id="ghost1"></div>
    <div class="ghost-el" id="ghost2"></div>

    <!-- Blast拡大エフェクト（Bass平均の1.8倍以上で発動） -->
    <div id="blastWrapper">
        <div id="blastTransform">
            <span id="blastText">SOUND</span>
        </div>
    </div>

    <!-- マイク許可前の表示 -->
    <div id="startScreen">CLICK TO START</div>

    <!-- メインテキスト表示エリア（Scene 1 CENTER） -->
    <div id="mainTextWrapper">
        <div id="textTransform">
            <span id="mainText">SOUND</span>
        </div>
    </div>

    <!-- 左下：テキスト入力 -->
    <input type="text" id="textInput" placeholder="ENTER TEXT" value="SOUND">

    <!-- 右下：MICトグルボタン -->
    <button id="micButton">MIC ON</button>

    <!-- 右上：デバッグ表示 -->
    <div id="debugPanel">
        Volume: 0<br>
        Bass: 0<br>
        Mid: 0<br>
        High: 0
    </div>

    <!-- 左下：シーンラベル -->
    <div id="sceneLabel"></div>

    <script>
        // --- DOM要素 ---
        const startScreen       = document.getElementById('startScreen');
        const mainTextWrapper   = document.getElementById('mainTextWrapper');
        const textTransformEl   = document.getElementById('textTransform');
        const mainText          = document.getElementById('mainText');
        const textInput         = document.getElementById('textInput');
        const micButton         = document.getElementById('micButton');
        const bgCanvas          = document.getElementById('bgCanvas');
        const ctx               = bgCanvas.getContext('2d');
        const debugPanel        = document.getElementById('debugPanel');
        const flashOverlay      = document.getElementById('flashOverlay');
        const blastWrapper      = document.getElementById('blastWrapper');
        const blastTransformEl  = document.getElementById('blastTransform');
        const blastTextEl       = document.getElementById('blastText');
        const transitionOverlay = document.getElementById('transitionOverlay');
        const sceneLabel        = document.getElementById('sceneLabel');
        const ghostElements     = [
            document.getElementById('ghost0'),
            document.getElementById('ghost1'),
            document.getElementById('ghost2')
        ];

        // --- 音声処理の状態 ---
        let audioContext = null;
        let analyser     = null;
        let dataArray    = null;
        let micStream    = null;
        let isMicActive  = false;
        let isStarted    = false;

        // --- canvasをウィンドウサイズに合わせる ---
        function resizeCanvas() {
            bgCanvas.width  = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            // Three.jsレンダラーもリサイズ
            if (orbitInited) {
                orbitRenderer.setSize(window.innerWidth, window.innerHeight);
                orbitCamera.aspect = window.innerWidth / window.innerHeight;
                orbitCamera.updateProjectionMatrix();
            }
        });

        // --- 指定Hz範囲の周波数エネルギー平均を計算 ---
        function getFrequencyEnergy(data, sampleRate, fftSize, minHz, maxHz) {
            const binSize = sampleRate / fftSize;
            const minBin  = Math.floor(minHz / binSize);
            const maxBin  = Math.min(Math.ceil(maxHz / binSize), data.length - 1);
            if (maxBin < minBin) return 0;
            let sum = 0;
            for (let i = minBin; i <= maxBin; i++) sum += data[i];
            return sum / (maxBin - minBin + 1);
        }

        // --- 入力値を別の範囲に線形マッピング（クランプあり） ---
        function mapRange(value, inMin, inMax, outMin, outMax) {
            const t = Math.max(0, Math.min(1, (value - inMin) / (inMax - inMin)));
            return outMin + (outMax - outMin) * t;
        }

        // --- 線形補間 ---
        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        // --- 角度の線形補間（±π折り返し対応） ---
        function lerpAngle(a, b, t) {
            let diff = b - a;
            while (diff >  Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            return a + diff * t;
        }

        // ============================================================
        // Scene 1「CENTER」の状態変数
        // ============================================================

        let curFontSize      = 160;
        let curFontWeight    = 100;
        let curLetterSpacing = 0.3;
        let curOpacity       = 0.25;
        let curSkewX         = 0;
        let curScaleY        = 1.0;
        let curOutlineAmount = 0;

        let charSpans       = [];
        let curCharY        = [];
        let charMultipliers = [];
        let prevBass        = 0;

        const bassHistory       = [];
        const HISTORY_SIZE      = 30;
        const MIN_BEAT_INTERVAL = 180;
        let lastBeatTime     = 0;
        let curExpandScale   = 1.0;
        let curGlitchX       = 0;
        let curFlashAlpha    = 0;
        let curBeatLineBoost = 1.0;

        let curLineLength  = 30;
        let curLineOpacity = 0.03;

        let curGhostOpacity = 0;
        const styleHistory  = [];

        let curDissolvePhase = 0;
        let dissolveDots     = [];
        let prevDissolveMode = false;

        let bubbles        = [];
        let bubbleTextDots = [];
        let prevBubbleMode = false;
        const MAX_BUBBLES  = 40;

        let isBlastActive    = false;
        let blastStartTime   = 0;
        const BLAST_DURATION = 300;

        let dissolveParticles = [];

        // ============================================================
        // Scene 2「TILE」の状態変数
        // ============================================================

        let tileOffsetX      = 0;
        let tileOffsetY      = 0;
        let tileFontWeight   = 100;
        let tileOpacity      = 0.4;
        let tileBeatPulseTime = 0;
        const tileCellSkews  = {}; // "col,row" → skew角度(deg)

        // ============================================================
        // Scene 3「MORPH」の状態変数
        // ============================================================

        let morphParticles      = null;  // パーティクル配列（初回setup時に初期化）
        let morphProgress       = 0;     // 0=波形状態、1=文字状態
        let morphBeatTime       = 0;     // 最後のビート発生時刻（ms）
        let morphLastText       = '';    // テキスト変更検出用
        let morphQuietStartTime = 0;     // 静寂開始時刻（0=静寂でない）
        let morphIsSettled      = false; // 全パーティクルが収束済み
        let morphTextMinX       = 0;     // テキストのX最小座標
        let morphTextMaxX       = 0;     // テキストのX最大座標

        // ============================================================
        // Scene 4「ORBIT」の状態変数（Three.jsオブジェクトはinitOrbit()で初期化）
        // ============================================================

        let orbitRenderer  = null;
        let orbitScene     = null;  // THREE.Scene
        let orbitCamera    = null;
        let orbitTempVec   = null;
        let orbitRings     = [];

        const ORBIT_CHAR_SPACING = 1.2;   // 文字間隔（worldユニット）
        const ORBIT_MAX_VEL_X    = 0.015; // X速度上限（NDC/frame）
        const ORBIT_MAX_VEL_Y    = 0.008; // Y速度上限（NDC/frame）

        let orbitAngle    = 0;
        let orbitRyFactor = 1.0;  // Bass連動の縦半径乗数（1.0〜2.5）
        let orbitMid      = 100;  // Mid連動のfont-weight基準値
        let orbitBeatTime = 0;
        let orbitInited   = false;

        // お気に入りシード値の配列
        const favoriteSeeds    = [263763, 422926, 977307, 907306, 994986];
        const ORBIT_RING_COUNT = 5;
        let orbitLastSeedIndex = -1;
        let orbitCurrentSeed   = 0;

        // Three.js + 楕円リングを一度だけ初期化する
        function initOrbit() {
            if (orbitInited) return;
            orbitInited = true;

            orbitRenderer = new THREE.WebGLRenderer({ antialias: true });
            orbitRenderer.setSize(window.innerWidth, window.innerHeight);
            orbitRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            orbitRenderer.setClearColor(0x0A0A0A, 1);
            // bgCanvas(z:1)の上に重ね、通常は非表示
            orbitRenderer.domElement.style.cssText =
                'position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;display:none;';
            document.body.insertBefore(orbitRenderer.domElement, document.body.firstChild);

            orbitScene  = new THREE.Scene();
            orbitCamera = new THREE.PerspectiveCamera(
                50, window.innerWidth / window.innerHeight, 0.1, 100
            );
            orbitCamera.position.set(0, 4, 12);
            orbitCamera.lookAt(0, 0, 0);
            orbitCamera.updateMatrixWorld();

            orbitTempVec = new THREE.Vector3();
            // orbitRingsはsetup()時にbuildOrbitRingsFromSeedで生成する
        }

        // 1楕円のスプライトを構築・破棄
        function buildOrbitRingSprites(ring, N) {
            ring.charData.forEach(d => {
                d.texture.dispose();
                d.sprite.material.dispose();
                ring.group.remove(d.sprite);
            });
            ring.charData = [];

            for (let i = 0; i < N; i++) {
                const canvas  = document.createElement('canvas');
                canvas.width  = 128;
                canvas.height = 128;
                const ctx2d   = canvas.getContext('2d');
                const texture = new THREE.CanvasTexture(canvas);
                const mat     = new THREE.SpriteMaterial({
                    map: texture, transparent: true, depthWrite: false
                });
                const sprite = new THREE.Sprite(mat);
                ring.group.add(sprite);
                ring.charData.push({
                    canvas, ctx2d, texture, sprite,
                    prevNdcX: undefined, prevNdcY: undefined,
                    curRotation: 0, curScaleX: 1.0, curScaleY: 1.0
                });
            }
            ring.currentN = N;
        }

        // 1文字をCanvasに描画してテクスチャを更新（opacity固定1.0）
        function drawOrbitChar(d, ch, fontWeight) {
            const { ctx2d, canvas, texture } = d;
            const cx = canvas.width  / 2;
            const cy = canvas.height / 2;
            ctx2d.clearRect(0, 0, canvas.width, canvas.height);
            ctx2d.save();
            ctx2d.translate(cx, cy);
            ctx2d.rotate(d.curRotation);
            ctx2d.scale(d.curScaleX, d.curScaleY);
            ctx2d.fillStyle    = '#FFFFFF';
            ctx2d.font         = `${Math.round(fontWeight)} 80px 'Noto Sans JP', sans-serif`;
            ctx2d.textAlign    = 'center';
            ctx2d.textBaseline = 'middle';
            ctx2d.fillText(ch, 0, 0);
            ctx2d.restore();
            texture.needsUpdate = true;
        }

        // シード値ベース疑似乱数（mulberry32）
        function mulberry32(seed) {
            return function() {
                seed |= 0;
                seed = (seed + 0x6D2B79F5) | 0;
                let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        // お気に入りシード値からランダムに1つ選ぶ（連続同一シード防止）
        function pickOrbitSeed() {
            let idx;
            do {
                idx = Math.floor(Math.random() * favoriteSeeds.length);
            } while (idx === orbitLastSeedIndex && favoriteSeeds.length > 1);
            orbitLastSeedIndex = idx;
            return favoriteSeeds[idx];
        }

        // シード値から5楕円を生成してorbitSceneに追加
        function buildOrbitRingsFromSeed(seed) {
            orbitRings.forEach(r => {
                r.charData.forEach(d => {
                    d.texture.dispose();
                    d.sprite.material.dispose();
                });
                orbitScene.remove(r.group);
            });
            orbitRings = [];

            const rng = mulberry32(seed);
            const SX  = 10.49;
            const SY  = 6.21;

            for (let i = 0; i < ORBIT_RING_COUNT; i++) {
                const offsetX = (rng() * 2 - 1) * 0.60 * (SX * 2);
                const offsetY = (rng() * 2 - 1) * 0.60 * (SY * 2);
                const rx      = rng() * (16.78 - 5.25) + 5.25;
                const ryBase  = rng() * (3.73 - 0.99)  + 0.99;
                const tiltDeg = rng() * 120 - 60;
                const dir     = i % 2 === 0 ? -1 : +1;

                const group = new THREE.Group();
                group.position.set(offsetX, offsetY, 0);
                const circumference = Math.PI * Math.sqrt(2 * (rx * rx + 4.0));
                orbitScene.add(group);

                orbitRings.push({
                    offsetX, offsetY,
                    rx, ryBase, rz: 2.0,
                    tilt: tiltDeg * Math.PI / 180,
                    dir,
                    depthOffset: -45 * Math.PI / 180,
                    circumference,
                    charData: [], currentN: 0, group
                });
            }
            orbitCurrentSeed = seed;
        }

        // ============================================================
        // シーン定義
        // ============================================================

        const scenes = [
            {
                id: 'center',
                label: 'CENTER',
                setup() {
                    mainTextWrapper.style.display = 'block';
                    ghostElements.forEach(g => { g.style.display = 'block'; });
                },
                cleanup() {
                    blastWrapper.style.display = 'none';
                    isBlastActive = false;
                },
                update(bass, mid, high, volume, bassAvg, now) {
                    updateScene1(bass, mid, high, volume, bassAvg, now);
                },
                onBeat(bass, bassAvg, now) {}
            },
            {
                id: 'tile',
                label: 'TILE',
                setup() {
                    mainTextWrapper.style.display = 'none';
                    ghostElements.forEach(g => { g.style.display = 'none'; });
                    blastWrapper.style.display = 'none';
                    isBlastActive = false;
                },
                cleanup() {},
                update(bass, mid, high, volume, bassAvg, now) {
                    updateScene2(bass, mid, high, volume, bassAvg, now);
                },
                onBeat(bass, bassAvg, now) {
                    // ビート時にパルスタイマーをセット
                    tileBeatPulseTime = now;
                }
            },
            {
                id: 'morph',
                label: 'MORPH',
                setup() {
                    mainTextWrapper.style.display = 'none';
                    ghostElements.forEach(g => { g.style.display = 'none'; });
                    blastWrapper.style.display = 'none';
                    isBlastActive = false;
                    if (!morphParticles) {
                        sampleMorphTargets();  // 内部でinitMorphParticlesも呼ぶ
                        morphLastText = textInput.value.trim() || 'SOUND';
                    }
                },
                cleanup() {},
                update(bass, mid, high, volume, bassAvg, now) {
                    updateScene3(bass, mid, high, volume, bassAvg, now);
                },
                onBeat(bass, bassAvg, now) {
                    morphBeatTime = now;
                }
            },
            {
                id: 'orbit',
                label: 'ORBIT',
                setup() {
                    mainTextWrapper.style.display = 'none';
                    ghostElements.forEach(g => { g.style.display = 'none'; });
                    blastWrapper.style.display = 'none';
                    isBlastActive = false;
                    // Three.jsキャンバスを表示
                    orbitRenderer.domElement.style.display = 'block';
                    // シード値をランダム選択してリング生成
                    buildOrbitRingsFromSeed(pickOrbitSeed());
                    // 初回スプライト構築
                    const rawText    = textInput.value.trim() || 'SOUND';
                    const characters = [...rawText];
                    orbitRings.forEach(ring => {
                        const N = Math.max(characters.length,
                            Math.round(ring.circumference / ORBIT_CHAR_SPACING));
                        buildOrbitRingSprites(ring, N);
                    });
                },
                cleanup() {
                    // Three.jsキャンバスを非表示
                    orbitRenderer.domElement.style.display = 'none';
                },
                update(bass, mid, high, volume, bassAvg, now) {
                    updateScene4(bass, mid, high, volume, bassAvg, now);
                },
                onBeat(bass, bassAvg, now) {
                    orbitBeatTime = now;
                }
            }
        ];

        let currentSceneIndex   = 0;
        let transitionPhase     = 'idle'; // 'fadeOut' | 'fadeIn' | 'idle'
        let transitionStartTime = 0;
        const TRANSITION_DURATION = 500; // 0.5秒
        let pendingSceneIndex   = 0;
        let autoSwitchTimer     = null;
        let strongBeatCount     = 0;
        let lastStrongBeatTime  = 0;

        // シーンラベル更新
        function updateSceneLabel() {
            const scene = scenes[currentSceneIndex];
            const num   = String(currentSceneIndex + 1).padStart(2, '0');
            const total = String(scenes.length).padStart(2, '0');
            sceneLabel.innerHTML = `${scene.label}<br>${num} / ${total}`;
        }

        // 自動切り替えタイマーをリセット・再スケジュール
        function scheduleAutoSwitch() {
            clearTimeout(autoSwitchTimer);
            autoSwitchTimer = setTimeout(switchToNextScene, Math.random() * 3000 + 5000);
        }

        // シーン切り替え（トランジション開始）
        function switchScene(nextIndex) {
            scheduleAutoSwitch(); // 切り替えのたびにタイマーをリセット
            if (transitionPhase !== 'idle') return;
            if (nextIndex === currentSceneIndex) return;
            pendingSceneIndex   = nextIndex;
            transitionPhase     = 'fadeOut';
            transitionStartTime = performance.now();
        }

        function switchToNextScene() {
            switchScene((currentSceneIndex + 1) % scenes.length);
        }

        function switchToPrevScene() {
            switchScene((currentSceneIndex - 1 + scenes.length) % scenes.length);
        }

        // ============================================================
        // テキスト初期化
        // ============================================================

        function setDisplayText(text) {
            const display = text.trim() === '' ? 'SOUND' : text.trim();
            mainText.innerHTML = [...display]
                .map(ch => `<span style="display:inline-block;">${ch}</span>`)
                .join('');
            charSpans       = [...mainText.querySelectorAll('span')];
            curCharY        = new Array(charSpans.length).fill(0);
            charMultipliers = charSpans.map((_, i) =>
                (i % 2 === 0 ? 1 : -1) * (0.7 + Math.random() * 0.6)
            );
            ghostElements.forEach(g => g.textContent = display);
            blastTextEl.textContent = display;
            dissolveDots      = [];
            bubbles           = [];
            bubbleTextDots    = [];
            dissolveParticles = [];
        }

        // ============================================================
        // Dissolve: ピクセル間引き用にドット座標をサンプリング＆シャッフル
        // ============================================================
        function sampleDissolveDots() {
            const display = mainText.textContent || 'SOUND';
            const off  = document.createElement('canvas');
            off.width  = bgCanvas.width;
            off.height = bgCanvas.height;
            const oc   = off.getContext('2d');
            oc.fillStyle    = '#FFFFFF';
            oc.font         = `${Math.round(curFontWeight)} ${Math.round(curFontSize)}px 'Noto Sans JP', sans-serif`;
            oc.textAlign    = 'center';
            oc.textBaseline = 'middle';
            oc.fillText(display, off.width / 2, off.height / 2);
            const idata = oc.getImageData(0, 0, off.width, off.height).data;
            const STEP  = 3;
            const dots  = [];
            for (let y = 0; y < off.height; y += STEP) {
                for (let x = 0; x < off.width; x += STEP) {
                    if (idata[(y * off.width + x) * 4 + 3] > 128) dots.push({ x, y });
                }
            }
            for (let i = dots.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dots[i], dots[j]] = [dots[j], dots[i]];
            }
            dissolveDots = dots;
        }

        // ============================================================
        // Bubble: 文字輪郭ピクセルをサンプリング
        // ============================================================
        function sampleBubbleTextDots() {
            const display = mainText.textContent || 'SOUND';
            const off  = document.createElement('canvas');
            off.width  = bgCanvas.width;
            off.height = bgCanvas.height;
            const oc   = off.getContext('2d');
            oc.fillStyle    = '#FFFFFF';
            oc.font         = `${Math.round(curFontWeight)} ${Math.round(curFontSize)}px 'Noto Sans JP', sans-serif`;
            oc.textAlign    = 'center';
            oc.textBaseline = 'middle';
            oc.fillText(display, off.width / 2, off.height / 2);
            const idata = oc.getImageData(0, 0, off.width, off.height).data;
            const w = off.width, h = off.height;
            const dots = [];
            for (let y = 2; y < h - 2; y += 2) {
                for (let x = 2; x < w - 2; x += 2) {
                    if (idata[(y * w + x) * 4 + 3] > 128) {
                        const neighbors = [
                            idata[((y - 2) * w + x) * 4 + 3],
                            idata[((y + 2) * w + x) * 4 + 3],
                            idata[(y * w + (x - 2)) * 4 + 3],
                            idata[(y * w + (x + 2)) * 4 + 3]
                        ];
                        if (neighbors.some(n => n < 64)) dots.push({ x, y });
                    }
                }
            }
            bubbleTextDots = dots;
        }

        // ============================================================
        // マイク制御
        // ============================================================
        async function startMic() {
            try {
                micStream    = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser     = audioContext.createAnalyser();
                analyser.fftSize              = 2048;
                analyser.smoothingTimeConstant = 0.8;
                const source = audioContext.createMediaStreamSource(micStream);
                source.connect(analyser);
                dataArray   = new Uint8Array(analyser.frequencyBinCount);
                isMicActive = true;
                micButton.textContent = 'MIC OFF';
            } catch (err) {
                console.error('マイクアクセスに失敗しました:', err);
            }
        }

        function stopMic() {
            if (micStream)    { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }
            analyser    = null;
            dataArray   = null;
            isMicActive = false;
            micButton.textContent = 'MIC ON';
        }

        // ============================================================
        // Scene 1「CENTER」更新処理
        // ============================================================
        function updateScene1(bass, mid, high, volume, bassAvg, now) {
            // Blast（Bass平均の1.8倍以上で発動：画面端への拡大）
            if (isBlastActive) {
                const elapsed    = now - blastStartTime;
                const t          = Math.min(1, elapsed / BLAST_DURATION);
                const blastScale = 1.0 + 1.5 * t;
                const blastOpa   = 1.0 - t;
                if (t >= 1) {
                    isBlastActive = false;
                    blastWrapper.style.display = 'none';
                } else {
                    blastTransformEl.style.transform = `translate(-50%, -50%) scale(${blastScale.toFixed(4)})`;
                    blastTextEl.style.opacity        = blastOpa.toFixed(4);
                }
            }

            // Size: Bass → font-size (160〜300px)
            const tFontSize = mapRange(bass, 0, 200, 160, 300);
            curFontSize = lerp(curFontSize, tFontSize, tFontSize > curFontSize ? 0.25 : 0.06);

            // Weight: Mid → font-weight (100〜900)
            const tFontWeight = mapRange(mid, 0, 175, 100, 900);
            curFontWeight = lerp(curFontWeight, tFontWeight, tFontWeight > curFontWeight ? 0.25 : 0.06);

            // Spacing: Bassが大きいほど狭く (0.3em〜-0.05em)
            const tLetterSpacing = mapRange(bass, 0, 200, 0.3, -0.05);
            curLetterSpacing = lerp(curLetterSpacing, tLetterSpacing, tLetterSpacing < curLetterSpacing ? 0.25 : 0.06);

            // Opacity: Volume → 0.25〜1.0
            const tOpacity = mapRange(volume, 0, 70, 0.25, 1.0);
            curOpacity = lerp(curOpacity, tOpacity, tOpacity > curOpacity ? 0.25 : 0.06);

            // skewX: High → 0〜8deg
            const tSkewX = mapRange(high, 0, 60, 0, 8);
            curSkewX = lerp(curSkewX, tSkewX, tSkewX > curSkewX ? 0.25 : 0.06);

            // ScaleY: High → 0.85〜1.2
            const tScaleY = mapRange(high, 0, 60, 0.85, 1.2);
            curScaleY = lerp(curScaleY, tScaleY, tScaleY > curScaleY ? 0.2 : 0.06);

            // Char: 各文字がBassに比例してY方向に独立して動く
            const bassRising = bass >= prevBass;
            prevBass = bass;
            charSpans.forEach((span, i) => {
                const targetY = mapRange(bass, 0, 200, 0, 22) * charMultipliers[i];
                curCharY[i]   = lerp(curCharY[i], targetY, bassRising ? 0.3 : 0.08);
                span.style.transform = `translateY(${curCharY[i].toFixed(2)}px)`;
            });

            // Highモード分岐（High 25〜40 → Bubble / High > 40 → Dissolve）
            const isBubbleMode   = high > 25 && high <= 40;
            const isDissolveMode = high > 40;

            if (isDissolveMode) {
                if (!prevDissolveMode) { sampleDissolveDots(); bubbles = []; }
                const tDissolvePhase = mapRange(high, 40, 70, 0, 1);
                curDissolvePhase = lerp(curDissolvePhase, tDissolvePhase, tDissolvePhase > curDissolvePhase ? 0.08 : 0.04);
                curGhostOpacity  = lerp(curGhostOpacity,  0, 0.15);
                curOutlineAmount = lerp(curOutlineAmount, 0, 0.15);
            } else {
                curDissolvePhase = lerp(curDissolvePhase, 0, 0.04);
                curGhostOpacity  = lerp(curGhostOpacity,  0, 0.05);
                curOutlineAmount = lerp(curOutlineAmount, 0, 0.08);
            }

            if (isBubbleMode && !prevBubbleMode) sampleBubbleTextDots();
            prevDissolveMode = isDissolveMode;
            prevBubbleMode   = isBubbleMode;

            if (high > 30) mainText.classList.add('shaking');
            else           mainText.classList.remove('shaking');

            // スタイル適用
            mainText.style.fontSize         = curFontSize + 'px';
            mainText.style.fontWeight       = Math.round(curFontWeight);
            mainText.style.letterSpacing    = curLetterSpacing.toFixed(4) + 'em';
            mainText.style.opacity          = (curOpacity * (1 - curDissolvePhase)).toFixed(4);
            mainText.style.color            = `rgba(255,255,255,${(1 - curOutlineAmount).toFixed(3)})`;
            mainText.style.webkitTextStroke = `${(curOutlineAmount * 2).toFixed(2)}px #FFFFFF`;

            textTransformEl.style.transform = [
                'translate(-50%, -50%)',
                `translateX(${curGlitchX.toFixed(2)}px)`,
                `skewX(${curSkewX.toFixed(2)}deg)`,
                `scaleY(${curScaleY.toFixed(4)})`,
                `scale(${curExpandScale.toFixed(4)})`
            ].join(' ');

            // Ghost: スタイル履歴に基づく時間差残像
            styleHistory.push({
                fontSize:      curFontSize,
                fontWeight:    curFontWeight,
                letterSpacing: curLetterSpacing,
                scaleY:        curScaleY,
                skewX:         curSkewX,
                glitchX:       curGlitchX
            });
            if (styleHistory.length > 18) styleHistory.shift();

            const GHOST_DELAYS   = [3, 7, 13];
            const GHOST_BASE_OPA = [0.5, 0.28, 0.10];
            ghostElements.forEach((g, i) => {
                const histIdx = Math.max(0, styleHistory.length - 1 - GHOST_DELAYS[i]);
                const hist    = styleHistory[histIdx];
                if (hist) {
                    g.style.fontSize      = hist.fontSize + 'px';
                    g.style.fontWeight    = Math.round(hist.fontWeight);
                    g.style.letterSpacing = hist.letterSpacing.toFixed(4) + 'em';
                    g.style.transform = [
                        'translate(-50%, -50%)',
                        `translateX(${hist.glitchX.toFixed(2)}px)`,
                        `skewX(${hist.skewX.toFixed(2)}deg)`,
                        `scaleY(${hist.scaleY.toFixed(4)})`
                    ].join(' ');
                }
                g.style.opacity = (curGhostOpacity * GHOST_BASE_OPA[i]).toFixed(3);
                g.textContent   = mainText.textContent;
            });

            // canvas描画
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            const cx = bgCanvas.width  / 2;
            const cy = bgCanvas.height / 2;

            // 放射状ライン（24本）
            const tLineLength  = mapRange(bass, 0, 200, 30, 250);
            const tLineOpacity = mapRange(volume, 0, 70, 0.03, 0.18);
            curLineLength  = lerp(curLineLength,  tLineLength,  0.1);
            curLineOpacity = lerp(curLineOpacity, tLineOpacity, 0.1);
            const boostedLen = curLineLength * curBeatLineBoost;
            ctx.strokeStyle = `rgba(255,255,255,${curLineOpacity.toFixed(4)})`;
            ctx.lineWidth   = 1;
            for (let i = 0; i < 24; i++) {
                const angle = (i / 24) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(angle) * boostedLen, cy + Math.sin(angle) * boostedLen);
                ctx.stroke();
            }

            // Bubble（High 25〜40: 文字輪郭に沿った泡）
            if (isBubbleMode && bubbleTextDots.length > 0) {
                const spawnRate  = mapRange(high, 25, 40, 0.3, 2.0);
                const spawnCount = Math.floor(spawnRate) + (Math.random() < (spawnRate % 1) ? 1 : 0);
                for (let s = 0; s < spawnCount && bubbles.length < MAX_BUBBLES; s++) {
                    const dot  = bubbleTextDots[Math.floor(Math.random() * bubbleTextDots.length)];
                    const maxR = mapRange(high, 25, 40, 10, 30);
                    bubbles.push({
                        x:       dot.x + (Math.random() - 0.5) * 24,
                        y:       dot.y + (Math.random() - 0.5) * 24,
                        r:       5 + Math.random() * (maxR - 5),
                        opacity: 0.5 + Math.random() * 0.5,
                        vy:      -(0.3 + Math.random() * 0.8)
                    });
                }
            }
            if (bubbles.length > 0) {
                ctx.lineWidth = 1;
                bubbles = bubbles.filter(b => {
                    b.y       += b.vy;
                    b.opacity -= 0.007;
                    if (b.opacity <= 0) return false;
                    ctx.strokeStyle = `rgba(255,255,255,${b.opacity.toFixed(3)})`;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    ctx.stroke();
                    return true;
                });
            }

            // Dissolveドット（High > 40）
            if (curDissolvePhase > 0.005 && dissolveDots.length > 0) {
                const showCount = Math.floor((1 - curDissolvePhase) * dissolveDots.length);
                ctx.fillStyle   = '#FFFFFF';
                ctx.globalAlpha = curOpacity;
                for (let i = 0; i < showCount; i++) {
                    ctx.fillRect(dissolveDots[i].x, dissolveDots[i].y, 2, 2);
                }
                ctx.globalAlpha = 1;
                if (isDissolveMode) {
                    const speed      = mapRange(high, 40, 80, 0.5, 4.0);
                    const spawnCount = Math.floor(mapRange(high, 40, 80, 1, 8));
                    for (let s = 0; s < spawnCount && dissolveParticles.length < 300; s++) {
                        const dot  = dissolveDots[Math.floor(Math.random() * dissolveDots.length)];
                        const dx   = dot.x - cx;
                        const dy   = dot.y - cy;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        dissolveParticles.push({
                            x:       dot.x,
                            y:       dot.y,
                            vx:      (dx / dist) * speed * (0.5 + Math.random()),
                            vy:      (dy / dist) * speed * (0.5 + Math.random()),
                            opacity: 0.7 + Math.random() * 0.3,
                            size:    1 + Math.random() * 2
                        });
                    }
                }
            }
            if (dissolveParticles.length > 0) {
                ctx.fillStyle = '#FFFFFF';
                dissolveParticles = dissolveParticles.filter(p => {
                    p.x       += p.vx;
                    p.y       += p.vy;
                    p.opacity -= 0.012;
                    if (p.opacity <= 0) return false;
                    ctx.globalAlpha = p.opacity;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    return true;
                });
                ctx.globalAlpha = 1;
            }
        }

        // ============================================================
        // Scene 2「TILE」更新処理
        // ============================================================
        function updateScene2(bass, mid, high, volume, bassAvg, now) {
            // 斜めスクロール速度: Volumeに比例
            const speed = mapRange(volume, 0, 70, 0.3, 2.5);
            tileOffsetX = (tileOffsetX + speed * 0.5 + 100) % 100;
            tileOffsetY = (tileOffsetY + speed * 0.5 + 100) % 100;

            // font-weight: Mid → 100〜900
            const tTileFontWeight = mapRange(mid, 0, 175, 100, 900);
            tileFontWeight = lerp(tileFontWeight, tTileFontWeight, 0.15);

            // opacity: Volume → 0.4〜1.0
            const tTileOpacity = mapRange(volume, 0, 70, 0.4, 1.0);
            tileOpacity = lerp(tileOpacity, tTileOpacity, 0.1);

            // ビートパルス（0.95→1.05→1.0）
            const pulse = getTileBeatPulse(now);

            // scaleY: Bass → 0.8〜1.3（各文字セル共通）
            const tileScaleY = mapRange(bass, 0, 200, 0.8, 1.3);

            const CELL_SIZE = 100;
            const FONT_SIZE = 80;
            const cols = Math.ceil(bgCanvas.width  / CELL_SIZE) + 2;
            const rows = Math.ceil(bgCanvas.height / CELL_SIZE) + 2;

            // Highが30以上のとき一部の文字セルがランダムにskew（±15deg）
            if (high > 30) {
                const skewCount = Math.floor(Math.random() * 4) + 1;
                for (let i = 0; i < skewCount; i++) {
                    const col = Math.floor(Math.random() * cols);
                    const row = Math.floor(Math.random() * rows);
                    tileCellSkews[`${col},${row}`] = (Math.random() - 0.5) * 30;
                }
            }
            // skewを減衰させて自然に戻す
            for (const key in tileCellSkews) {
                tileCellSkews[key] *= 0.85;
                if (Math.abs(tileCellSkews[key]) < 0.1) delete tileCellSkews[key];
            }

            // canvas描画
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            // 入力テキストを1文字ずつ分解（空なら "SOUND"）
            const rawText  = textInput.value.trim() || 'SOUND';
            const characters = [...rawText];

            ctx.globalAlpha  = tileOpacity;
            ctx.fillStyle    = '#FFFFFF';
            ctx.font         = `${Math.round(tileFontWeight)} ${FONT_SIZE}px 'Noto Sans JP', sans-serif`;
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';

            const startX = -tileOffsetX - CELL_SIZE;
            const startY = -tileOffsetY - CELL_SIZE;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const cellIndex = row * cols + col;
                    const ch   = characters[cellIndex % characters.length];
                    const cellX = startX + col * CELL_SIZE + CELL_SIZE / 2;
                    const cellY = startY + row * CELL_SIZE + CELL_SIZE / 2;
                    const skew  = tileCellSkews[`${col},${row}`] || 0;

                    ctx.save();
                    ctx.translate(cellX, cellY);
                    ctx.scale(pulse, tileScaleY * pulse);
                    if (Math.abs(skew) > 0.01) {
                        // skewX: x' = x + y * tan(θ)
                        ctx.transform(1, 0, Math.tan(skew * Math.PI / 180), 1, 0, 0);
                    }
                    ctx.fillText(ch, 0, 0);
                    ctx.restore();
                }
            }

            ctx.globalAlpha = 1;
        }

        // ビートパルスの計算（0.95→1.05→1.0）
        function getTileBeatPulse(now) {
            if (tileBeatPulseTime === 0) return 1.0;
            const elapsed = now - tileBeatPulseTime;
            if (elapsed < 100) return lerp(1.0,  0.95, elapsed / 100);
            if (elapsed < 200) return lerp(0.95, 1.05, (elapsed - 100) / 100);
            if (elapsed < 400) return lerp(1.05, 1.0,  (elapsed - 200) / 200);
            return 1.0;
        }

        // ============================================================
        // Scene 3「MORPH」テキストピクセルからパーティクルを生成
        // ============================================================
        function sampleMorphTargets() {
            const rawText  = textInput.value.trim() || 'SOUND';
            const off      = document.createElement('canvas');
            off.width      = bgCanvas.width;
            off.height     = bgCanvas.height;
            const oc       = off.getContext('2d');
            const fontSize = Math.round(bgCanvas.width * 0.25);
            oc.fillStyle    = '#FFFFFF';
            oc.font         = `900 ${fontSize}px 'Noto Sans JP', sans-serif`;
            oc.textAlign    = 'center';
            oc.textBaseline = 'middle';
            oc.fillText(rawText, off.width / 2, off.height / 2);

            const idata  = oc.getImageData(0, 0, off.width, off.height).data;
            const STEP   = 3;
            const pixels = [];
            let minX = off.width, maxX = 0;
            for (let y = 0; y < off.height; y += STEP) {
                for (let x = 0; x < off.width; x += STEP) {
                    if (idata[(y * off.width + x) * 4 + 3] > 128) {
                        pixels.push({ x, y });
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                    }
                }
            }

            morphTextMinX = pixels.length > 0 ? minX : Math.floor(bgCanvas.width * 0.2);
            morphTextMaxX = pixels.length > 0 ? maxX : Math.floor(bgCanvas.width * 0.8);

            // Fisher-Yatesシャッフルして最大800個をパーティクルとして使用
            for (let i = pixels.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pixels[i], pixels[j]] = [pixels[j], pixels[i]];
            }
            const selected = pixels.slice(0, Math.min(800, pixels.length));

            // テキストのピクセル座標をそのままパーティクルの初期位置に設定
            morphParticles = selected.map(px => ({
                x:      px.x,                        // 固定X（一切動かない）
                baseY:  px.y,                        // 基準Y（テキストピクセル座標）
                y:      px.y,                        // 現在Y（sinブレで変化）
                phase:  Math.random() * Math.PI * 2, // ランダム位相（バラバラに動く）
                speed:  3 + Math.random() * 5,       // 振動速度 3〜8（パーティクルごと固定）
                baseH:  8 + Math.random() * 12       // 基本縦棒高さ 8〜20px
            }));
        }

        // ============================================================
        // Scene 3「MORPH」更新処理
        // ============================================================
        function updateScene3(bass, mid, high, volume, bassAvg, now) {
            if (!morphParticles) return;

            // テキスト変更検出 → パーティクル再生成
            const currentText = textInput.value.trim() || 'SOUND';
            if (currentText !== morphLastText) {
                morphLastText = currentText;
                sampleMorphTargets();
                if (!morphParticles) return;
            }

            const t             = now / 1000;                        // 秒単位の時間
            const bassAmplitude = mapRange(bass,   0, 200, 0,  60); // Bassによるブレ幅 0〜60px
            const barHBoost     = mapRange(volume, 0,  70, 0,  40); // Volumeによる縦棒高さ増加

            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            ctx.fillStyle   = '#FFFFFF';
            ctx.globalAlpha = 0.85;

            for (const p of morphParticles) {
                // Y: テキストピクセル座標を基準にsinでブレ（各パーティクルがバラバラに動く）
                const oscillation = Math.sin(t * p.speed + p.phase) * bassAmplitude;
                p.y = p.baseY + oscillation;

                // 縦棒の高さ: 基本値 + 音量ブースト（最大60px）
                const barH = Math.min(60, p.baseH + barHBoost);

                ctx.fillRect(
                    Math.round(p.x - 2),
                    Math.round(p.y - barH / 2),
                    4,
                    Math.max(1, Math.round(barH))
                );
            }

            ctx.globalAlpha = 1;
        }

        // ============================================================
        // Scene 4「ORBIT」更新処理
        // ============================================================
        function updateScene4(bass, mid, high, volume, bassAvg, now) {
            // bgCanvasをクリア（Three.jsキャンバスが上に重なるため描画はしない）
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            // 回転速度: Volumeに比例（0.003〜0.02）、マイクOFF時は一定
            const speed = isMicActive ? mapRange(volume, 0, 70, 0.003, 0.02) : 0.005;
            orbitAngle += speed;

            // 縦半径乗数: Bassに比例（1.0〜2.5）
            const targetRyFactor = mapRange(bass, 0, 200, 1.0, 2.5);
            orbitRyFactor = lerp(orbitRyFactor, targetRyFactor, 0.08);

            // font-weight基準値: Mid → 100〜900（lerp係数 上昇0.25 / 下降0.06）
            const targetMid = mapRange(mid, 0, 175, 100, 900);
            orbitMid = lerp(orbitMid, targetMid, targetMid > orbitMid ? 0.25 : 0.06);

            // ビートパルス: 各楕円グループを 1.0→1.2→1.0（150ms）
            const beatElapsed = now - orbitBeatTime;
            let beatScale = 1.0;
            if (beatElapsed < 75) {
                beatScale = 1.0 + 0.2 * (beatElapsed / 75);
            } else if (beatElapsed < 150) {
                beatScale = 1.2 - 0.2 * ((beatElapsed - 75) / 75);
            }
            orbitRings.forEach(r => r.group.scale.setScalar(beatScale));

            // 入力テキスト処理
            const rawText    = textInput.value.trim() || 'SOUND';
            const characters = [...rawText];

            // 楕円ごとに文字数を算出し、変化時にスプライトを再構築
            orbitRings.forEach(ring => {
                const N = Math.max(characters.length,
                    Math.round(ring.circumference / ORBIT_CHAR_SPACING));
                if (N !== ring.currentN) buildOrbitRingSprites(ring, N);
            });

            orbitCamera.updateMatrixWorld();

            // 各楕円の文字を更新
            orbitRings.forEach(ring => {
                const cosTilt   = Math.cos(ring.tilt);
                const sinTilt   = Math.sin(ring.tilt);
                const ringAngle = ring.dir * orbitAngle;
                const currentRY = ring.ryBase * orbitRyFactor;

                for (let i = 0; i < ring.currentN; i++) {
                    const theta = -ring.dir * (i / ring.currentN) * Math.PI * 2 + ringAngle;
                    const ch    = characters[i % characters.length];

                    const baseX = ring.rx  * Math.cos(theta);
                    const baseY = currentRY * Math.sin(theta);
                    const z     = ring.rz  * Math.sin(theta);

                    const localX = baseX * cosTilt - baseY * sinTilt;
                    const localY = baseX * sinTilt + baseY * cosTilt;

                    // depthOffsetで最大サイズポイントをずらす
                    const depth = (Math.sin(theta + ring.depthOffset) + 1) / 2;

                    orbitTempVec.set(localX + ring.offsetX, localY + ring.offsetY, z)
                        .project(orbitCamera);
                    const ndcX = orbitTempVec.x;
                    const ndcY = orbitTempVec.y;

                    const d = ring.charData[i];
                    let velX = 0, velY = 0;
                    if (d.prevNdcX !== undefined) {
                        velX = ndcX - d.prevNdcX;
                        velY = ndcY - d.prevNdcY;
                    }
                    d.prevNdcX = ndcX;
                    d.prevNdcY = ndcY;

                    const velSpeed = Math.sqrt(velX * velX + velY * velY);
                    const targetRotation = velSpeed > 0.00005
                        ? Math.atan2(-velY, velX)
                        : d.curRotation;
                    const targetScaleX = mapRange(Math.abs(velX), 0, ORBIT_MAX_VEL_X, 0.5, 2.0);
                    const targetScaleY = mapRange(Math.abs(velY), 0, ORBIT_MAX_VEL_Y, 0.5, 1.8);

                    d.curRotation = lerpAngle(d.curRotation, targetRotation, 0.15);
                    d.curScaleX   = lerp(d.curScaleX, targetScaleX, 0.15);
                    d.curScaleY   = lerp(d.curScaleY, targetScaleY, 0.15);

                    const fontWeight  = Math.min(900, Math.max(100,
                        Math.round(mapRange(depth, 0, 1, 100, orbitMid))
                    ));
                    const spriteScale = mapRange(depth, 0, 1, 0.54, 2.4);

                    drawOrbitChar(d, ch, fontWeight);
                    d.sprite.position.set(localX, localY, z);
                    d.sprite.scale.setScalar(spriteScale);
                }
            });

            orbitRenderer.render(orbitScene, orbitCamera);
        }

        // ============================================================
        // メインアニメーションループ
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            let bass = 0, mid = 0, high = 0, volume = 0;
            if (isMicActive && analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                const sr  = audioContext.sampleRate;
                const fft = analyser.fftSize;
                bass   = getFrequencyEnergy(dataArray, sr, fft,     0,   200);
                mid    = getFrequencyEnergy(dataArray, sr, fft,   200,  2000);
                high   = getFrequencyEnergy(dataArray, sr, fft,  2000, 20000);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                volume = sum / dataArray.length;
            }

            debugPanel.innerHTML =
                `Volume: ${Math.round(volume)}<br>` +
                `Bass: ${Math.round(bass)}<br>` +
                `Mid: ${Math.round(mid)}<br>` +
                `High: ${Math.round(high)}`;

            // ビート検出
            bassHistory.push(bass);
            if (bassHistory.length > HISTORY_SIZE) bassHistory.shift();
            const bassAvg = bassHistory.reduce((a, b) => a + b, 0) / bassHistory.length;
            const now     = performance.now();

            if (isMicActive && bassAvg > 0 && bass > bassAvg * 1.3 && now - lastBeatTime > MIN_BEAT_INTERVAL) {
                lastBeatTime = now;
                const sign = Math.random() < 0.5 ? 1 : -1;

                const beatRatio   = bass / bassAvg;
                const flashTarget = mapRange(beatRatio, 1.3, 2.0, 0.03, 0.08);
                curFlashAlpha = Math.max(curFlashAlpha, flashTarget);

                if (bass > bassAvg * 1.8) {
                    curExpandScale   = 1.2;
                    curGlitchX       = sign * (20 + Math.random() * 20);
                    curBeatLineBoost = 1.8;
                    // Blast はScene 1のみ発動
                    if (!isBlastActive && currentSceneIndex === 0) {
                        isBlastActive  = true;
                        blastStartTime = now;
                        blastTextEl.textContent         = mainText.textContent;
                        blastTextEl.style.fontSize      = curFontSize + 'px';
                        blastTextEl.style.fontWeight    = String(Math.round(curFontWeight));
                        blastTextEl.style.letterSpacing = curLetterSpacing.toFixed(4) + 'em';
                        blastTransformEl.style.transform = 'translate(-50%, -50%)';
                        blastTextEl.style.opacity        = '1';
                        blastWrapper.style.display       = 'block';
                    }
                } else if (bass > bassAvg * 1.5) {
                    curExpandScale   = 1.2;
                    curGlitchX       = sign * (20 + Math.random() * 20);
                    curBeatLineBoost = 1.8;
                } else {
                    curExpandScale   = Math.max(curExpandScale, 1.08);
                    curGlitchX       = sign * (10 + Math.random() * 15);
                    curBeatLineBoost = Math.max(curBeatLineBoost, 1.8);
                }

                // 音楽トリガー: 強いビート（1.5倍以上）が3回連続で次のシーンへ
                if (bass > bassAvg * 1.5) {
                    if (now - lastStrongBeatTime < 2000) {
                        strongBeatCount++;
                    } else {
                        strongBeatCount = 1;
                    }
                    lastStrongBeatTime = now;
                    if (strongBeatCount >= 3) {
                        strongBeatCount = 0;
                        switchToNextScene();
                    }
                }

                // シーン固有のビート処理（Scene 2のパルスなど）
                scenes[currentSceneIndex].onBeat(bass, bassAvg, now);
            }

            // ビート系をlerpで戻す
            curExpandScale   = lerp(curExpandScale,   1.0, 0.1);
            curGlitchX       = lerp(curGlitchX,       0,   0.25);
            curFlashAlpha    = lerp(curFlashAlpha,     0,   0.55);
            curBeatLineBoost = lerp(curBeatLineBoost,  1.0, 0.3);

            // トランジション処理（0.5秒でフェードアウト→シーン切替→フェードイン）
            if (transitionPhase === 'fadeOut') {
                const t = Math.min(1, (now - transitionStartTime) / TRANSITION_DURATION);
                transitionOverlay.style.opacity = t.toFixed(3);
                if (t >= 1) {
                    scenes[currentSceneIndex].cleanup();
                    currentSceneIndex   = pendingSceneIndex;
                    scenes[currentSceneIndex].setup();
                    updateSceneLabel();
                    transitionPhase     = 'fadeIn';
                    transitionStartTime = now;
                }
            } else if (transitionPhase === 'fadeIn') {
                const t = Math.min(1, (now - transitionStartTime) / TRANSITION_DURATION);
                transitionOverlay.style.opacity = (1 - t).toFixed(3);
                if (t >= 1) {
                    transitionOverlay.style.opacity = '0';
                    transitionPhase = 'idle';
                }
            }

            // シーン描画
            scenes[currentSceneIndex].update(bass, mid, high, volume, bassAvg, now);

            // フラッシュオーバーレイ（全シーン共通）
            flashOverlay.style.backgroundColor = curFlashAlpha > 0.005
                ? `rgba(255,255,255,${curFlashAlpha.toFixed(3)})`
                : '';
        }

        // ============================================================
        // アプリケーション開始
        // ============================================================
        async function handleStart() {
            if (isStarted) return;
            isStarted = true;

            startScreen.style.display = 'none';
            textInput.style.display   = 'block';
            micButton.style.display   = 'block';
            sceneLabel.style.display  = 'block';

            // Scene 4 ORBIT用 Three.js を初期化（一度だけ）
            initOrbit();

            // 最初のシーン（CENTER）をセットアップ
            scenes[currentSceneIndex].setup();
            updateSceneLabel();
            setDisplayText(textInput.value);

            await startMic();
            animate();
            scheduleAutoSwitch();
        }

        // クリックでアプリ開始
        document.addEventListener('click', () => {
            if (!isStarted) handleStart();
        });

        // MICボタン：ON/OFFトグル
        micButton.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (isMicActive) stopMic();
            else await startMic();
        });

        // テキスト入力：リアルタイムで両シーンに反映
        textInput.addEventListener('input', () => {
            setDisplayText(textInput.value);
        });

        // 入力欄クリックでhandleStartが誤って呼ばれないよう伝播を止める
        textInput.addEventListener('click', e => e.stopPropagation());

        // 矢印キーで手動シーン切り替え
        document.addEventListener('keydown', (e) => {
            if (!isStarted) return;
            if (e.key === 'ArrowRight') switchToNextScene();
            if (e.key === 'ArrowLeft')  switchToPrevScene();
        });
    </script>
</body>
</html>
